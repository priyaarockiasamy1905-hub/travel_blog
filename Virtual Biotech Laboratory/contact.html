   <!-- Contact Section -->

   <section class="contact-section">

      <h1>Contact Us</h1>

      <p>
         Feel free to contact us for biotechnology learning support.
      </p>

      <!-- Contact Form -->

      <form onsubmit="showMessage(event)">

         <input type="text"

         placeholder="Enter Your Name"

         required>

         <input type="email"

         placeholder="Enter Your Email"

         required>

         <textarea rows="5"

         placeholder="Enter Your Message"

         required>

         </textarea>

         <button type="submit">

            Send Message

         </button>

      </form>

      <!-- Contact Details -->

      <div class="contact-details">

         <p>

            <i class="fa-solid fa-envelope"></i>

            biotechlab@gmail.com

         </p>

         <p>

            <i class="fa-solid fa-phone"></i>

            +91 9876543210

         </p>

         <p>

            <i class="fa-solid fa-location-dot"></i>

            Coimbatore, India

         </p>

      </div>

      <!-- Social Icons -->

      <div class="social-icons">

         <i class="fa-brands fa-github"></i>

         <i class="fa-brands fa-linkedin"></i>

         <i class="fa-brands fa-instagram"></i>

      </div>

      <!-- Google Map -->

         <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d125322.50873824842!2d76.96723500000003!3d11.013968899999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ba859af2f971cb5%3A0x2fc1c81e183ed282!2sCoimbatore%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1779878795877!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
